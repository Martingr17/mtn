<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Код подтверждения аккаунта</title>
</head>
<body style="margin:0;padding:24px;background:#0d1117;color:#f5f7fb;font-family:Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;margin:0 auto;background:#111827;border:1px solid rgba(255,255,255,0.1);border-radius:20px;overflow:hidden;">
    <tr>
      <td style="padding:32px;">
        <p style="margin:0 0 8px;color:#8ea2c8;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;">MTN ID</p>
        <h1 style="margin:0 0 12px;font-size:28px;line-height:1.2;color:#ffffff;">Код подтверждения аккаунта</h1>
        <p style="margin:0 0 24px;font-size:16px;line-height:1.6;color:#d5dbea;">
          Используйте код ниже, чтобы завершить регистрацию аккаунта.
        </p>
        <div style="margin:0 0 24px;padding:18px 20px;background:#1a2436;border:1px solid rgba(255,255,255,0.08);border-radius:16px;text-align:center;">
          <strong style="font-size:36px;letter-spacing:0.3em;color:#ffffff;">{{ code }}</strong>
        </div>
        <p style="margin:0 0 12px;font-size:15px;line-height:1.6;color:#d5dbea;">
          Код действует {{ expires_in_minutes }} мин.
        </p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#8ea2c8;">
          Если вы не запрашивали этот код, просто проигнорируйте письмо.
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
