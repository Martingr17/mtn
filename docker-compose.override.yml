services:
  app:
    environment:
      DEBUG: "true"
      ENVIRONMENT: development
    volumes:
      - .:/app
      - ./tests:/app/tests
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    ports:
      - "5433:5432"

  redis:
    ports:
      - "6380:6379"

  celery_worker:
    environment:
      DEBUG: "true"
    volumes:
      - .:/app
    working_dir: /app

  nginx:
    volumes:
      - ./docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/app/static:ro
      - ./uploads:/app/uploads
