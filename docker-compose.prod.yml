services:
  postgres:
    image: postgres:16-alpine
    container_name: operator_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - operator_prod_network

  redis:
    image: redis:7-alpine
    container_name: operator_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - operator_prod_network

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: operator-app:${APP_VERSION:-latest}
    container_name: operator_app_prod
    environment: &prod_env
      PYTHONPATH: /app:/app/app
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"
      DEMO_MODE: ${DEMO_MODE:-false}
      DEMO_SHOW_SMS_CODE: ${DEMO_SHOW_SMS_CODE:-false}
      DEMO_SHOW_EMAIL_CODE: ${DEMO_SHOW_EMAIL_CODE:-false}
      AUTO_SCHEMA_SYNC: ${AUTO_SCHEMA_SYNC:-false}
      RELOAD: ${RELOAD:-false}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      BILLING_API_KEY: ${BILLING_API_KEY}
      BILLING_API_URL: ${BILLING_API_URL}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS}
      YKASSA_SHOP_ID: ${YKASSA_SHOP_ID}
      YKASSA_SECRET_KEY: ${YKASSA_SECRET_KEY}
      YKASSA_WEBHOOK_SECRET: ${YKASSA_WEBHOOK_SECRET}
      YKASSA_RETURN_URL: ${YKASSA_RETURN_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMS_PROVIDER: ${SMS_PROVIDER}
      SMS_API_URL: ${SMS_API_URL}
      SMS_API_KEY: ${SMS_API_KEY}
      TELEGRAM_ALERTS_ENABLED: ${TELEGRAM_ALERTS_ENABLED:-false}
      TELEGRAM_MOCK_MODE: ${TELEGRAM_MOCK_MODE:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_NOC_CHAT_ID: ${TELEGRAM_NOC_CHAT_ID:-}
      WEBPUSH_VAPID_PUBLIC_KEY: ${WEBPUSH_VAPID_PUBLIC_KEY}
      WEBPUSH_VAPID_PRIVATE_KEY: ${WEBPUSH_VAPID_PRIVATE_KEY}
      WEBPUSH_VAPID_SUBJECT: ${WEBPUSH_VAPID_SUBJECT}
      SENTRY_DSN: ${SENTRY_DSN}
    volumes:
      - uploads_prod:/app/uploads
      - logs_prod:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - operator_prod_network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: operator_celery_worker_prod
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-4} --max-tasks-per-child=1000
    environment:
      <<: *prod_env
      POSTGRES_USE_NULL_POOL: "true"
    volumes:
      - uploads_prod:/app/uploads
      - logs_prod:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - operator_prod_network

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: operator_celery_beat_prod
    command: celery -A app.workers.celery_app beat --loglevel=info --schedule=/home/appuser/celerybeat-schedule
    environment:
      <<: *prod_env
      POSTGRES_USE_NULL_POOL: "true"
    volumes:
      - logs_prod:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - operator_prod_network

  nginx:
    image: nginx:alpine
    container_name: operator_nginx_prod
    volumes:
      - ./docker/nginx.prod.conf.nginx:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - ./app/static:/usr/share/nginx/html/static:ro
      - uploads_prod:/usr/share/nginx/html/uploads:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - operator_prod_network

  prometheus:
    image: prom/prometheus:latest
    container_name: operator_prometheus_prod
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_prod_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - operator_prod_network

  grafana:
    image: grafana/grafana:latest
    container_name: operator_grafana_prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_prod_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - operator_prod_network

networks:
  operator_prod_network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  uploads_prod:
  logs_prod:
  prometheus_prod_data:
  grafana_prod_data:
